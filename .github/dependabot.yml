version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      low-risk:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 5

  - package-ecosystem: pip
    directory: /esphome
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      low-risk:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 5

  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      low-risk:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 5
