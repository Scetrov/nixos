# Blueprint: ansible-automation-service-account
#
# Replaces the imperative Ansible bootstrap that relied on the short-lived
# AUTHENTIK_BOOTSTRAP_TOKEN.
#
# This Blueprint is generated by the NixOS prepare-env script into
# /var/lib/authentik/templates/ — mounted to /templates inside the
# Authentik container.  Authentik applies any YAML files found there
# at start-up.
#
# The placeholder __AUTHENTIK_API_TOKEN__ is substituted with the
# decrypted value of /root/secrets/authentik_api_token.age.
# Ansible uses the same secret via the vault variable authentik_config_api_token.
version: 1
metadata:
  name: ansible-automation-service-account
entries:
  # ── Service-account user ───────────────────────────────────────────────
  - model: authentik_core.user
    id: ansible-automation-user
    ident: ak-service-account-ansible-automation
    attrs:
      username: ansible-automation
      name: Ansible Automation
      is_active: true
      type: service_account
    groups:
      # Built-in superuser group (created by Authentik on first boot)
      - !Ident goauthentik.io/groups:authentik-admins

  # ── Non-expiring API token ────────────────────────────────────────────
  - model: authentik_core.token
    id: ansible-automation-token
    ident: ak-api-token-ansible-automation
    attrs:
      intent: api
      expires: null
      key: __AUTHENTIK_API_TOKEN__
    user: !Ref ansible-automation-user
