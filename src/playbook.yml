- name: Check NixOS Configuration
  hosts: localhost
  roles:
    - nixos-lint

- name: Deploy NixOS Configuration
  hosts: all
  vars_files:
    - secrets.yml
  pre_tasks:
    - name: Deploy Authentik Blueprint template
      ansible.builtin.import_role:
        name: authentik-config
        tasks_from: deploy-blueprint
      when: authentik_config_enabled | default(false)

  roles:
    - secrets
    - nixos
    - role: authentik-config
      when: authentik_config_enabled | default(false)
    - user-scetrov
