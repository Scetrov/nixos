authentik_config_url: "https://identity.net.scetrov.live"
authentik_config_ready_url: "{{ authentik_config_url }}/-/health/ready/"
authentik_config_info_url: "{{ authentik_config_url }}/api/v3/root/config/"
authentik_config_setup_url: "{{ authentik_config_url }}/setup"
authentik_config_api_base_url: "{{ authentik_config_url }}/api/v3"
authentik_config_validate_certs: true
authentik_config_bootstrap_token: "{{ authentik_bootstrap_token }}"
authentik_config_bootstrap_username: "akadmin"
authentik_config_bootstrap_password: "{{ authentik_bootstrap_password | default(authentik_admin_password) }}"
authentik_config_primary_admin_username: "{{ authentik_admin_user }}"
authentik_config_primary_admin_password: "{{ authentik_admin_password }}"
authentik_config_primary_admin_name: "Authentik Admin"
authentik_config_primary_admin_email: >-
  {{
    authentik_admin_email
    | default(authentik_admin_user if ('@' in authentik_admin_user) else '')
  }}
authentik_config_primary_admin_path: "users"
authentik_config_primary_admin_blueprint_name: "primary-admin"
authentik_config_primary_admin_blueprint_template: "blueprint-primary-admin.yaml.j2"
authentik_config_service_account_blueprint_name: "service-account-api"
authentik_config_service_account_blueprint_template: "blueprint-service-account.yaml.j2"
authentik_config_service_account_username: "api-automation"
authentik_config_admin_recovery_flow_slug: "default-authentication-flow"

# Source-of-truth bearer token for Authentik API automation. This role does
# not use /core/users/service_account/ for steady-state auth because that
# endpoint returns a generated APP_PASSWORD token, not this known API token.
authentik_config_api_token: "{{ authentik_api_token }}"

# Grafana OAuth2 provider configuration
authentik_config_grafana_provider_name: "Grafana"
authentik_config_grafana_application_name: "Grafana"
authentik_config_grafana_application_slug: "grafana"
authentik_config_grafana_launch_url: "https://metrics.net.scetrov.live/grafana"
authentik_config_grafana_redirect_uri: "https://metrics.net.scetrov.live/grafana/login/generic_oauth"
authentik_config_grafana_logout_uri: "https://metrics.net.scetrov.live/grafana/logout"
authentik_config_grafana_client_id: "{{ grafana_authentik_client_id }}"
authentik_config_grafana_client_secret: "{{ grafana_authentik_client_secret }}"

authentik_config_authorization_flow_slug: "default-provider-authorization-implicit-consent"
authentik_config_invalidation_flow_slug: "default-provider-invalidation-flow"

# Hermes Authentik configuration
authentik_config_hermes_provider_name: "Hermes"
authentik_config_hermes_application_name: "Hermes"
authentik_config_hermes_application_slug: "hermes"
authentik_config_hermes_external_host: "https://hermes.net.scetrov.live"

authentik_config_scope_mappings:
  openid:
    scope_name: "openid"
    managed: "goauthentik.io/providers/oauth2/scope-openid"
  profile:
    scope_name: "profile"
    managed: "goauthentik.io/providers/oauth2/scope-profile"
  email:
    scope_name: "email"
    managed: "goauthentik.io/providers/oauth2/scope-email"
  entitlements:
    scope_name: "entitlements"
    managed: "goauthentik.io/providers/oauth2/scope-entitlements"
