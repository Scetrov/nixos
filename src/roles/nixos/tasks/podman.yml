- name: Get list of active Podman systemd services
  become: true
  ansible.builtin.command:
    argv:
      - systemctl
      - list-units
      - --type=service
      - --state=active
      - --plain
      - --no-legend
      - podman-*.service
  register: podman_services
  changed_when: false

- name: Restart each Podman systemd service
  become: true
  ansible.builtin.systemd:
    name: "{{ item.split()[0] }}"
    state: restarted
  loop: "{{ podman_services.stdout_lines }}"
  when: podman_services.stdout != ""
  register: restart_results
  loop_control:
    label: "{{ item.split()[0] }}"

- name: Show restart results
  become: true
  ansible.builtin.debug:
    msg: "Restarted service {{ item.item.split()[0] }} with changed={{ item.changed }}"
  loop: "{{ restart_results.results }}"
  when: restart_results.results is defined
