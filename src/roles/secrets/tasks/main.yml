- name: Ensure /root/secrets directory exists
  become: true
  ansible.builtin.file:
    path: /root/secrets
    state: directory
    mode: '0700'

- name: Copy secrets.nix
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/secrets/{{ item }}"
    dest: /root/secrets/{{ item }}
    owner: root
    group: root
    mode: '0600'
  loop:
    - secrets.nix

- name: Ensure /root/.ssh directory exists
  become: true
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: '0700'

- name: Copy SSH public key to /root/.ssh
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/id/id_ed25519.pub"
    dest: /root/.ssh/id_ed25519.pub
    owner: root
    group: root
    mode: '0644'

- name: Copy SSH private key to /root/.ssh
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/id/id_ed25519"
    dest: /root/.ssh/id_ed25519
    owner: root
    group: root
    mode: '0600'
  when: secrets_deploy_private_key | default(false)
  no_log: true

- name: Create temporary local agenix identity file
  delegate_to: localhost
  ansible.builtin.tempfile:
    state: file
    suffix: .agenix-id
  register: local_agenix_identity
  run_once: true

- name: Decrypt local agenix identity file
  delegate_to: localhost
  ansible.builtin.copy:
    src: "{{ role_path }}/files/id/id_ed25519"
    dest: "{{ local_agenix_identity.path }}"
    mode: '0600'
    decrypt: true
  run_once: true
  no_log: true

- name: Read existing OnCall Secret Key if present
  delegate_to: localhost
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ role_path }}/files/secrets"
    secret_file="oncall_secret_key.age"
    if [ -f "$secret_file" ]; then
      agenix -d "$secret_file" -i "{{ local_agenix_identity.path }}"
    fi
  register: existing_oncall_secret_key
  changed_when: false
  failed_when: false
  run_once: true
  no_log: true

- name: Reuse existing OnCall Secret Key
  set_fact:
    oncall_secret_key: "{{ existing_oncall_secret_key.stdout }}"
  when:
    - oncall_secret_key | default('oncall_secret_key_placeholder') == 'oncall_secret_key_placeholder'
    - existing_oncall_secret_key.rc == 0
    - existing_oncall_secret_key.stdout | length > 0

- name: Generate OnCall Secret Key if placeholder
  set_fact:
    oncall_secret_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
  when: oncall_secret_key | default('oncall_secret_key_placeholder') == 'oncall_secret_key_placeholder'

- name: Read existing OnCall PostgreSQL password if present
  delegate_to: localhost
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ role_path }}/files/secrets"
    secret_file="oncall_postgresql_password.age"
    if [ -f "$secret_file" ]; then
      agenix -d "$secret_file" -i "{{ local_agenix_identity.path }}"
    fi
  register: existing_oncall_postgresql_password
  changed_when: false
  failed_when: false
  run_once: true
  no_log: true

- name: Reuse existing OnCall PostgreSQL password
  set_fact:
    oncall_postgresql_password: "{{ existing_oncall_postgresql_password.stdout }}"
  when:
    - oncall_postgresql_password | default('oncall_postgresql_password_placeholder') == 'oncall_postgresql_password_placeholder'
    - existing_oncall_postgresql_password.rc == 0
    - existing_oncall_postgresql_password.stdout | length > 0

- name: Generate OnCall PostgreSQL password if placeholder
  set_fact:
    oncall_postgresql_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=48') }}"
  when: oncall_postgresql_password | default('oncall_postgresql_password_placeholder') == 'oncall_postgresql_password_placeholder'

- name: Require Grafana secret key from vault or generated secrets
  ansible.builtin.assert:
    that:
      - grafana_secret_key is defined
      - grafana_secret_key | length > 0
    fail_msg: "Define grafana_secret_key in src/secrets.yml or src/generated-secrets.yml."
  no_log: true

- name: Validate generated OIDC values before agenix rendering
  ansible.builtin.assert:
    that:
      - (vars[item] | default('') | string | trim) | length > 0
      - (vars[item] | default('') | string | trim | lower) != 'null'
      - not ((vars[item] | default('') | string | trim) is match('.*_placeholder$'))
    fail_msg: >-
      Required generated OIDC value {{ item }} is missing, empty, null, or a placeholder.
      Refresh src/generated-secrets.yml with scripts/tofu.sh before deploying OIDC-enabled services.
    success_msg: "Required generated OIDC value {{ item }} is present and non-placeholder."
  loop:
    - grafana_authentik_client_id
    - grafana_authentik_client_secret
    - dtrack_oidc_client_id
    - dtrack_oidc_client_secret
  run_once: true
  no_log: false

- name: Read existing Frontier Indexer PostgreSQL password if present
  delegate_to: localhost
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ role_path }}/files/secrets"
    secret_file="frontier_indexer_db_password.age"
    if [ -f "$secret_file" ]; then
      agenix -d "$secret_file" -i "{{ local_agenix_identity.path }}"
    fi
  register: existing_frontier_indexer_db_password
  changed_when: false
  failed_when: false
  run_once: true
  no_log: true

- name: Reuse existing Frontier Indexer PostgreSQL password
  set_fact:
    frontier_indexer_db_password: "{{ existing_frontier_indexer_db_password.stdout }}"
  when:
    - frontier_indexer_db_password | default('frontier_indexer_db_password_placeholder') == 'frontier_indexer_db_password_placeholder'
    - existing_frontier_indexer_db_password.rc == 0
    - existing_frontier_indexer_db_password.stdout | length > 0

- name: Generate Frontier Indexer PostgreSQL password if placeholder
  set_fact:
    frontier_indexer_db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=48') }}"
  when: frontier_indexer_db_password | default('frontier_indexer_db_password_placeholder') == 'frontier_indexer_db_password_placeholder'

- name: Read existing MCP client token if present
  delegate_to: localhost
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ role_path }}/files/secrets"
    secret_file="mcp_client_token.age"
    if [ -f "$secret_file" ]; then
      agenix -d "$secret_file" -i "{{ local_agenix_identity.path }}"
    fi
  register: existing_mcp_client_token
  changed_when: false
  failed_when: false
  run_once: true
  no_log: true

- name: Reuse existing MCP client token
  set_fact:
    mcp_client_token: "{{ existing_mcp_client_token.stdout | regex_replace('^(MCP_CLIENT_TOKEN=)+', '') }}"
  when:
    - mcp_client_token | default('mcp_client_token_placeholder') == 'mcp_client_token_placeholder'
    - existing_mcp_client_token.rc == 0
    - existing_mcp_client_token.stdout | length > 0

- name: Generate MCP client token if placeholder
  set_fact:
    mcp_client_token: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"
  when: mcp_client_token | default('mcp_client_token_placeholder') == 'mcp_client_token_placeholder'

- name: Define filenames dynamically
  set_fact:
    age_secrets:
      - { name: "authentik_admin_user", content: "{{ authentik_admin_user }}" }
      - { name: "authentik_bootstrap_password", content: "{{ authentik_bootstrap_password | default(authentik_admin_password) }}" }
      - { name: "authentik_bootstrap_email", content: "{{ authentik_bootstrap_email | default('') }}" }
      - { name: "authentik_bootstrap_token", content: "{{ authentik_bootstrap_token }}" }
      - { name: "authentik_api_token", content: "{{ authentik_api_token }}" }
      - { name: "authentik_admin_password", content: "{{ authentik_admin_password }}" }
      - { name: "authentik_postgresql_password", content: "{{ authentik_postgresql_password }}" }
      - { name: "authentik_secret_key", content: "{{ authentik_secret_key }}" }
      - { name: "cloudflare_dns_zone_api_key", content: "{{ cloudflare_dns_zone_api_key }}" }
      - { name: "cloudflare_email", content: "{{ cloudflare_email }}" }
      - { name: "grafana_authentik_client_id", content: "GF_AUTH_GENERIC_OAUTH_CLIENT_ID={{ grafana_authentik_client_id }}" }
      - { name: "grafana_authentik_client_secret", content: "GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET={{ grafana_authentik_client_secret }}" }
      - { name: "grafana_secret_key", content: "{{ grafana_secret_key }}" }
      - { name: "ssh_bastion_key", content: "{{ ssh_bastion_key }}" }
      - { name: "ssh_hsm_key", content: "{{ ssh_hsm_key }}" }
      - { name: "user_password_hashed", content: "{{ user_password_hashed }}" }
      - { name: "wireless_pskraw", content: "WIRELESS_PSKRAW={{ wireless_pskraw }}" }
      - { name: "wireless_ssid", content: "WIRELESS_SSID={{ wireless_ssid }}" }
      - { name: "syncthing_gui_password", content: "syncthing_gui_password" }
      - { name: "hermes_webui_env", content: "OPENROUTER_API_KEY={{ openrouter_api_key }}\nHERMES_WEBUI_PASSWORD={{ hermes_webui_password }}\nHERMES_DEFAULT_MODEL={{ hermes_default_model | default('qwen/qwen3.6-flash') }}" }
      - { name: "home_assistant_metrics_token", content: "{{ home_assistant_metrics_token | default('home_assistant_metrics_token_placeholder') }}" }
      - { name: "oncall_secret_key", content: "{{ oncall_secret_key }}" }
      - { name: "oncall_postgresql_password", content: "{{ oncall_postgresql_password }}" }
      - { name: "grafana_oncall_api_key", content: "{{ grafana_oncall_api_key | default(grafana_admin_token | default(lookup('env', 'GRAFANA_SERVICE_TOKEN')), true) | default('grafana_oncall_api_key_placeholder', true) }}" }
      - { name: "loki_token", content: "{{ loki_token | default('loki_token_placeholder') }}" }
      - { name: "loki_token_hash", content: "LOKI_TOKEN_HASH={{ loki_token_hash | default('loki_token_hash_placeholder') }}" }
      - { name: "dtrack_db_password", content: "{{ dtrack_db_password | default('dtrack_db_password_placeholder') }}" }
      - { name: "dtrack_github_pat", content: "{{ dtrack_github_pat | default('dtrack_github_pat_placeholder') }}" }
      - { name: "dtrack_nvd_api_key", content: "{{ dtrack_nvd_api_key | default('dtrack_nvd_api_key_placeholder') }}" }
      - { name: "dtrack_oidc_client_id", content: "{{ dtrack_oidc_client_id | default('dtrack_oidc_client_id_placeholder') }}" }
      - { name: "dtrack_oidc_client_secret", content: "{{ dtrack_oidc_client_secret | default('dtrack_oidc_client_secret_placeholder') }}" }
      - { name: "frontier_indexer_db_password", content: "{{ frontier_indexer_db_password }}" }
      - { name: "mcp_client_token", content: "MCP_CLIENT_TOKEN={{ mcp_client_token }}" }
      - { name: "grafana_mcp_token", content: "{{ grafana_mcp_token | default('grafana_mcp_token_placeholder') }}" }
      - { name: "github_repository_observability_app_id", content: "{{ github_repository_observability_app_id | default('github_repository_observability_app_id_placeholder') }}" }
      - { name: "github_repository_observability_private_key", content: "{{ github_repository_observability_private_key | default('github_repository_observability_private_key_placeholder') }}" }
      - { name: "openrouter_management_env", content: "OPENROUTER_MANAGEMENT_KEY={{ openrouter_management_key }}" }
      - { name: "codex_oauth_env", content: "{{ codex_oauth_env }}" }
      - { name: "chatgpt_account_id", content: "{{ chatgpt_account_id | default('chatgpt_account_id_placeholder') }}" }

- name: Gather facts about existing secret files
  delegate_to: localhost
  ansible.builtin.find:
    paths: "{{ role_path }}/files/secrets/"
    patterns: "*.age"
  register: found_secrets

- name: Set facts for existing secret files
  set_fact:
    ansible_local:
      files:
        secrets: "{{ dict(found_secrets.files | map(attribute='path') | map('basename') | zip(found_secrets.files)) }}"
  run_once: true

- name: Generate Secret Files
  delegate_to: localhost
  ansible.builtin.shell: |
    set -euo pipefail
    cd {{ role_path }}/files/secrets/

    expected_file="$(mktemp)"
    actual_file="$(mktemp)"
    trap 'rm -f "$expected_file" "$actual_file"' EXIT
    decrypt_failed=0

    printf '%s' "$SECRET_CONTENT" > "$expected_file"

    if [ -f "{{ item.name }}.age" ]; then
      if ! agenix -d "{{ item.name }}.age" -i "{{ local_agenix_identity.path }}" > "$actual_file" 2>/dev/null; then
        decrypt_failed=1
        : > "$actual_file"
      fi
    fi

    if [ ! -f "{{ item.name }}.age" ] || [ "$decrypt_failed" -eq 1 ] || ! cmp -s "$expected_file" "$actual_file"; then
      if [ "$decrypt_failed" -eq 1 ]; then
        rm -f "{{ item.name }}.age"
      fi
      printf '%s' "$SECRET_CONTENT" | agenix -i "{{ local_agenix_identity.path }}" -e "{{ item.name }}.age"
      printf 'changed'
    fi
  loop: "{{ age_secrets }}"
  run_once: true
  loop_control:
    label: "{{ item.name }}.age"
  environment:
    SECRET_CONTENT: "{{ item.content }}"
  register: generated_secret_files
  changed_when: generated_secret_files.stdout == 'changed'
  no_log: true

- name: Copy generated files to remote machine
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/secrets/{{ item.name }}.age"
    dest: "/root/secrets/{{ item.name }}.age"
    owner: root
    group: root
    mode: '0600'
  loop: "{{ age_secrets }}"
  loop_control:
    label: "{{ item.name }}.age"
  no_log: true

- name: Remove temporary local agenix identity file
  delegate_to: localhost
  ansible.builtin.file:
    path: "{{ local_agenix_identity.path }}"
    state: absent
  run_once: true
  no_log: true

- name: Ensure Network Manager config folder exists
  become: true
  ansible.builtin.file:
    path: /etc/NetworkManager/system-connections
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Copy Network Manager config
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/NetworkManager/system-connections/"
    dest: /etc/NetworkManager/system-connections/
    owner: root
    group: root
    mode: '0600'
